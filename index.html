
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <meta name="theme-color" content="#ffffff" />
      <meta name="description" content="Tratto - Restaurant Management App" />
      <link rel="apple-touch-icon" href="/tratoo.svg" />
      <link rel="icon" type="image/svg+xml" href="/tratoo.svg" />
      <title>Tratto</title>
    </head>

    <body>
      <div id="root">
        <style>
          body {
            margin: 0;
            padding: 0;
          }
          .splash-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100dvw;
            background-color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
          }
          .splash-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
            animation: pulse-splash 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
          }
          .splash-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin-splash 1s linear infinite;
          }
          @keyframes spin-splash {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
          @keyframes pulse-splash {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
          }
        </style>
        <div class="splash-container">
          <img src="/tratoo.svg" alt="Tratto Logo" class="splash-logo" />
          <div class="splash-spinner"></div>
        </div>
      </div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
